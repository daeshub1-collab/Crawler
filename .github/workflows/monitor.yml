name: Build crawler JSON for Dify

on:
  schedule:
    - cron: '45 22 * * 0'  # 매주 월요일 07:45 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r injection_monitor/requirements.txt

      - name: Run crawler and export JSON
        run: |
          cd injection_monitor
          python main.py --export-json ../data/latest_articles.json --skip-mail

      - name: Commit latest JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/latest_articles.json
          git commit -m "Update latest crawler articles" || echo "No changes to commit"
          git push