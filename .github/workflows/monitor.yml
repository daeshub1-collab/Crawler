name: 사출기 모니터링 자동 실행

on:
  schedule:
    - cron: '0 0 * * 1'  # 매주 월요일 09:00 KST (UTC 00:00)
  workflow_dispatch:       # 수동 실행 버튼도 활성화

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r injection_monitor/requirements.txt

      - name: 크롤러 실행
        env:
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_SUBJECT: ${{ secrets.MAIL_SUBJECT }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FETCH_TIMEOUT: 15
          FETCH_RETRY: 2
          SELENIUM_WAIT: 20
          SCHEDULE_DAY: monday
          SCHEDULE_TIME: "09:00"
        run: |
          cd injection_monitor
          python main.py --once